name: DeepTruth AI CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10"]
        node-version: ["20.x"]

    steps:
    - uses: actions/checkout@v4

    # 1. Backend CI Setup
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        
    - name: Check Python Syntax & Imports
      run: |
        # Ensure our critical backend files compile without syntax errors
        python -m py_compile backend/app.py
        python -m py_compile backend/test_video_model.py
        python -m py_compile backend/text_audio_models.py

    # 2. Frontend CI Setup
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Test Frontend Build
      working-directory: ./frontend
      run: npm run build

    # 3. Simulated Deployment (CD)
    - name: Deployment Check
      run: |
        echo "✅ CI/CD Pipeline successful. Project is ready for deployment."
        echo "Artifacts built and syntax verified."
